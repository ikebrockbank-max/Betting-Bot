name: Power Parlay Scanner (every 4 hours)

on:
  schedule:
    # Runs at 10 AM, 2 PM, 6 PM, 10 PM ET (14:00, 18:00, 22:00, 02:00 UTC)
    - cron: '0 14 * * *'   # 10 AM ET — morning lines open
    - cron: '0 18 * * *'   # 2 PM ET  — afternoon updates
    - cron: '0 22 * * *'   # 6 PM ET  — pre-game prime time
    - cron: '0 2  * * *'   # 10 PM ET — late games / next day lines
    # Results update: 9 AM ET every day — resolves yesterday's picks in Supabase
    - cron: '0 13 * * *'   # 9 AM ET  — fetch yesterday's box scores, mark hit/miss
  workflow_dispatch:
    inputs:
      sports:
        description: 'Sports to scan (space-separated: NBA MLB WNBA TENNIS SOCCER)'
        required: false
        default: ''
      force:
        description: 'Force resend even if picks were recently sent'
        required: false
        default: 'false'
      update_results:
        description: 'Run results updater instead of scanner'
        required: false
        default: 'false'

# Shared env block — all jobs inherit these secrets
env:
  SUPABASE_URL:      https://gggozciyvjeqjnmufigp.supabase.co
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  NTFY_TOPIC:        ${{ secrets.NTFY_TOPIC }}
  ODDS_API_KEY:      ${{ secrets.ODDS_API_KEY }}
  OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
  DISCORD_WEBHOOK_PREMIUM: ${{ secrets.DISCORD_WEBHOOK_PREMIUM }}
  DISCORD_WEBHOOK_FREE:    ${{ secrets.DISCORD_WEBHOOK_FREE }}

jobs:
  power-parlay:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Run on all schedules except the 9 AM results run, and on manual dispatch
    # unless the user explicitly requested the results updater.
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.update_results != 'true') ||
      (github.event_name == 'schedule' && github.event.schedule != '0 13 * * *')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore state cache (dedup + stat caches)
        uses: actions/cache@v4
        with:
          path: logs/
          key: parlay-state-${{ github.run_id }}
          restore-keys: |
            parlay-state-
            scanner-state-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Power Parlay Scanner
        env:
          BANKROLL: ${{ secrets.BANKROLL }}
        run: |
          SPORTS="${{ github.event.inputs.sports }}"
          FORCE="${{ github.event.inputs.force }}"
          UPDATE="${{ github.event.inputs.update_results }}"

          if [ "$UPDATE" = "true" ]; then
            echo "Running results updater..."
            python3 calibration_tracker.py update
            exit 0
          fi

          CMD="python3 scanner_power_parlay.py --sports MLB WNBA NBA"
          if [ -n "$SPORTS" ]; then
            CMD="python3 scanner_power_parlay.py --sports $SPORTS"
          fi
          if [ "$FORCE" = "true" ]; then
            CMD="$CMD --force"
          fi
          echo "Running: $CMD"
          $CMD

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: logs/
          key: parlay-state-${{ github.run_id }}

  update-results:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Runs on the 9 AM cron, or when manually dispatched with update_results=true
    if: >
      github.event.schedule == '0 13 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.update_results == 'true')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve yesterday's picks
        run: |
          echo "Fetching actual results and marking hit/miss in Supabase..."
          python3 calibration_tracker.py update
          echo "Done."

      - name: Calibration report (hit rate by confidence bucket)
        run: |
          echo "--- CALIBRATION BREAKDOWN ---"
          python3 calibration_tracker.py report
          echo ""
          echo "--- CONFIDENCE ACCURACY ---"
          python3 calibration_tracker.py calibration
          echo ""
          echo "--- DEEP DIVE DIAGNOSTIC ---"
          python3 diagnose_picks.py
