name: PP + Underdog Scanner

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run PrizePicks scanner
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          NOTIFY_PHONE_CARRIER_EMAIL: ${{ secrets.NOTIFY_PHONE_CARRIER_EMAIL }}
        run: python3 auto_scan.py

      - name: Run Underdog scanner
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          NOTIFY_PHONE_CARRIER_EMAIL: ${{ secrets.NOTIFY_PHONE_CARRIER_EMAIL }}
        run: python3 scanner_underdog.py --auto

      - name: Commit state cache
        continue-on-error: true
        run: |
          git config user.name "scanner-bot"
          git config user.email "scanner-bot@noreply"
          git add logs/.seen_bugs.json logs/.seen_flash.json logs/.seen_promos.json \
                  logs/.line_snapshot.json logs/.seen_ud_bugs.json 2>/dev/null || true
          git diff --staged --quiet && exit 0
          git commit -m "chore: scanner state [skip ci]"
          git fetch origin main
          git rebase -X ours origin/main
          git push
