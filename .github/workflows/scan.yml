name: PP + Underdog Scanner

on:
  schedule:
    # Raised from every 15 min — that's 96 PrizePicks API calls/day from this
    # workflow alone, on top of power_parlay.yml's own calls. Confirmed cause
    # of two full days (6/25, 6/26) of silently failed daily picks: PrizePicks
    # returned 403/429 to the GitHub Actions runner's IP, while the same
    # request succeeded instantly from a non-Actions IP — a volume-triggered
    # block, not an outage. 30 min still gives same-day bug/flash-sale alerts
    # at half the call volume.
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: logs/
          key: scanner-state-${{ github.run_id }}
          restore-keys: scanner-state-

      - name: Install dependencies
        run: pip install -r requirements.txt

      # NTFY_TOPIC restored for this step — user wants bug/flash-sale/
      # consensus-edge alerts from auto_scan.py on the same topic after all.
      - name: Run PrizePicks scanner
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          DISCORD_WEBHOOK_PREMIUM: ${{ secrets.DISCORD_WEBHOOK_PREMIUM }}
          DISCORD_WEBHOOK_FREE: ${{ secrets.DISCORD_WEBHOOK_FREE }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY_BASE64: ${{ secrets.KALSHI_PRIVATE_KEY_BASE64 }}
        run: python3 auto_scan.py

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: logs/
          key: scanner-state-${{ github.run_id }}

      # Removed: this duplicated daily_top_picks.yml, which already runs
      # daily_top_picks.py once cleanly at 18:00 UTC. Because this step ran on
      # every 15-minute tick within the 17:00-18:59 UTC window with no dedup
      # logic in daily_top_picks.py, it could fire the same notification up
      # to 8 extra times a day on top of the dedicated workflow's single send.

      # NTFY_TOPIC intentionally omitted — pp_playoff_report.py's pre-game
      # report is a separate alert type from the daily top picks push.
      - name: Run pre-game parlay report
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          DISCORD_WEBHOOK_PREMIUM: ${{ secrets.DISCORD_WEBHOOK_PREMIUM }}
          DISCORD_WEBHOOK_FREE: ${{ secrets.DISCORD_WEBHOOK_FREE }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY_BASE64: ${{ secrets.KALSHI_PRIVATE_KEY_BASE64 }}
        run: python3 pp_playoff_report.py
